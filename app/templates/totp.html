<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Weryfikacja 2FA — WŁASNY LEPSZY KSeF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/static/styles.css" rel="stylesheet">
    <style>
        .login-wrap {
            max-width: 360px;
            margin: 80px auto;
            padding: 2rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
        }
        .login-wrap h2 { margin-bottom: .5rem; }
        .login-wrap p.hint { color: #666; margin-bottom: 1.5rem; font-size: .9rem; }
        .login-wrap label { display: block; margin-bottom: .25rem; font-weight: 600; }
        .login-wrap input[type=text] {
            width: 100%;
            padding: .5rem .75rem;
            box-sizing: border-box;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1.25rem;
            letter-spacing: .2rem;
            text-align: center;
        }
        .login-wrap button {
            width: 100%;
            padding: 0;
            height: 40px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            transition: background 0.15s;
        }
        .login-wrap button:hover { background: #0055aa; }
        .login-error {
            color: #c0392b;
            margin-bottom: 1rem;
            padding: .5rem .75rem;
            background: #fdf0ef;
            border: 1px solid #e8b4b0;
            border-radius: 4px;
        }
        .back-link { display: block; margin-top: 1rem; text-align: center; font-size: .9rem; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <h2>Weryfikacja 2FA</h2>
        <p class="hint">Wpisz 6-cyfrowy kod z aplikacji uwierzytelniającej.</p>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/ui/login/totp">
            <label for="code">Kod jednorazowy</label>
            <input
                type="text"
                id="code"
                name="code"
                required
                autofocus
                inputmode="numeric"
                pattern="[0-9]{6}"
                maxlength="6"
                autocomplete="one-time-code"
                placeholder="000000"
            >
            <button type="submit">Zweryfikuj</button>
        </form>
        <a class="back-link" href="/ui/login">← Wróć do logowania</a>
    </div>
</body>
</html>
